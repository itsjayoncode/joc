name: Deploy Playground

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 10.13.1
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm browser-session-playground:build
      - uses: actions/upload-artifact@v4
        with:
          name: browser-session-playground-dist
          path: apps/browser-session-playground/dist
