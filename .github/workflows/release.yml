name: Release

on:
  workflow_dispatch:
    inputs:
      create_draft_release:
        description: "Create or update a draft GitHub release for an existing tag"
        required: false
        default: false
        type: boolean
      tag_name:
        description: "Existing git tag to use for a draft release"
        required: false
        type: string

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  quality:
    name: Release Quality Gates
    if: github.event_name == 'workflow_dispatch' && inputs.create_draft_release && inputs.tag_name != ''
    uses: ./.github/workflows/quality.yml
    permissions:
      contents: read
    secrets: inherit

  draft-release:
    name: Draft GitHub Release
    needs: quality
    if: github.event_name == 'workflow_dispatch' && inputs.create_draft_release && inputs.tag_name != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure the requested tag exists
        run: git rev-parse "refs/tags/${{ inputs.tag_name }}"

      - name: Create or update draft release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ inputs.tag_name }}" >/dev/null 2>&1; then
            gh release edit "${{ inputs.tag_name }}" --draft --notes-file CHANGELOG.md
          else
            gh release create "${{ inputs.tag_name }}" --draft --generate-notes
          fi
