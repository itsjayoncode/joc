version: 2

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:00"
    labels:
      - "dependencies"
      - "github-actions"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:30"
    open-pull-requests-limit: 10
    groups:
      linting:
        patterns:
          - "eslint"
          - "@eslint/*"
          - "typescript-eslint"
          - "eslint-plugin-*"
      testing:
        patterns:
          - "vitest"
          - "@vitest/*"
          - "jsdom"
      formatting:
        patterns:
          - "prettier"
      build-and-types:
        patterns:
          - "typescript"
          - "turbo"
          - "vite-tsconfig-paths"
    labels:
      - "dependencies"
      - "npm"
